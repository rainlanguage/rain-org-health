<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>rain org health — pipeline</title>
<style>
  :root {
    --bg: #fdfcfb; --surface: #f6f4f1; --surface-2: #eeebe6;
    --ink: #201d1a; --ink-2: #5c574f; --ink-3: #8a847a;
    --border: #e7e2da; --accent: #2563eb;
    --debt: #b45309; --debt-bg: #fef3e2; --debt-border: #f5d9ae;
    --clean: #15803d; --clean-bg: #e7f5ec;
    --bar: #b45309; --bar-track: #eeebe6;
    --crit: #dc2626; --pm-fill: rgba(32,29,26,0.07); --pm-fill-deg: rgba(220,38,38,0.15);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #16150f; --surface: #1f1d16; --surface-2: #27241b;
      --ink: #ece8e0; --ink-2: #aaa79c; --ink-3: #706c62;
      --border: #332f24; --accent: #60a5fa;
      --debt: #fbbf24; --debt-bg: #2a220f; --debt-border: #4a3c17;
      --clean: #4ade80; --clean-bg: #12241a;
      --bar: #d98a2b; --bar-track: #27241b;
      --crit: #f87171; --pm-fill: rgba(236,232,224,0.07); --pm-fill-deg: rgba(248,113,113,0.18);
    }
  }
  :root[data-theme="dark"] {
    --bg: #16150f; --surface: #1f1d16; --surface-2: #27241b;
    --ink: #ece8e0; --ink-2: #aaa79c; --ink-3: #706c62;
    --border: #332f24; --accent: #60a5fa;
    --debt: #fbbf24; --debt-bg: #2a220f; --debt-border: #4a3c17;
    --clean: #4ade80; --clean-bg: #12241a;
    --bar: #d98a2b; --bar-track: #27241b;
    --crit: #f87171; --pm-fill: rgba(236,232,224,0.07); --pm-fill-deg: rgba(248,113,113,0.18);
  }
  :root[data-theme="light"] {
    --bg: #fdfcfb; --surface: #f6f4f1; --surface-2: #eeebe6;
    --ink: #201d1a; --ink-2: #5c574f; --ink-3: #8a847a;
    --border: #e7e2da; --accent: #2563eb;
    --debt: #b45309; --debt-bg: #fef3e2; --debt-border: #f5d9ae;
    --clean: #15803d; --clean-bg: #e7f5ec;
    --bar: #b45309; --bar-track: #eeebe6;
    --crit: #dc2626; --pm-fill: rgba(32,29,26,0.07); --pm-fill-deg: rgba(220,38,38,0.15);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 980px; margin: 0 auto; padding: 32px 20px 80px; }
  header { display: flex; flex-wrap: wrap; align-items: baseline; gap: 8px 16px; margin-bottom: 4px; }
  h1 { font-size: 22px; margin: 0; letter-spacing: -0.01em; }
  .meta { color: var(--ink-3); font-size: 13px; }
  .theme-btn {
    margin-left: auto; background: var(--surface); color: var(--ink-2);
    border: 1px solid var(--border); border-radius: 8px; padding: 5px 10px;
    font-size: 13px; cursor: pointer;
  }
  .tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin: 24px 0; }
  .tile { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; }
  .tile .n { font-size: 26px; font-weight: 650; letter-spacing: -0.02em; }
  .tile .l { color: var(--ink-3); font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; margin-top: 2px; }
  h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--ink-3);
       margin: 32px 0 12px; font-weight: 600; }
  .summary { display: grid; gap: 6px; }
  .srow {
    display: grid; grid-template-columns: 220px 1fr 34px; align-items: center; gap: 12px;
    background: none; border: 0; padding: 4px 6px; border-radius: 8px; cursor: pointer;
    color: inherit; font: inherit; text-align: left; width: 100%;
  }
  .srow:hover { background: var(--surface); }
  .srow.active { background: var(--surface-2); }
  .srow .sig { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12.5px; color: var(--ink-2);
               overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .srow.active .sig { color: var(--ink); font-weight: 600; }
  .track { height: 12px; background: var(--bar-track); border-radius: 4px; overflow: hidden; }
  .fill { height: 100%; background: var(--bar); border-radius: 4px; min-width: 3px; }
  .srow .c { font-variant-numeric: tabular-nums; font-size: 13px; color: var(--ink-2); text-align: right; }
  .controls { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin: 12px 0 8px; }
  input[type=search] {
    flex: 1; min-width: 180px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 11px; color: var(--ink); font-size: 14px;
  }
  .clearf { background: var(--surface); border: 1px solid var(--border); color: var(--ink-2);
            border-radius: 8px; padding: 7px 11px; font-size: 13px; cursor: pointer; display: none; }
  .clearf.show { display: inline-block; }
  .repo { border-bottom: 1px solid var(--border); padding: 12px 4px; display: grid;
          grid-template-columns: 240px 1fr; gap: 14px; align-items: start; }
  .repo:last-child { border-bottom: 0; }
  .repo a { color: var(--ink); font-weight: 600; text-decoration: none; font-size: 14.5px; word-break: break-word; }
  .repo a:hover { color: var(--accent); text-decoration: underline; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    display: inline-flex; align-items: center; gap: 5px; font-size: 12px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    background: var(--debt-bg); color: var(--debt); border: 1px solid var(--debt-border);
    border-radius: 6px; padding: 2px 8px; cursor: pointer;
  }
  .chip::before { content: "▲"; font-size: 9px; }
  .chip.dim { opacity: 0.32; }
  .clean { display: inline-flex; align-items: center; gap: 6px; color: var(--clean); font-size: 13px; }
  .clean::before { content: "✓"; font-weight: 700; }
  .empty { color: var(--ink-3); padding: 24px 4px; }
  .pm-chart-wrap { position: relative; background: var(--surface); border: 1px solid var(--border);
                   border-radius: 12px; padding: 16px 16px 8px; }
  .pm-chart { width: 100%; height: auto; display: block; overflow: visible; }
  .pm-chart text { fill: var(--ink-3); font-size: 10px; font-variant-numeric: tabular-nums; }
  .pm-axis-line { stroke: var(--border); stroke-width: 1; }
  .pm-area { fill: var(--pm-fill); stroke: none; }
  .pm-area.deg { fill: var(--pm-fill-deg); }
  .pm-line { fill: none; stroke: var(--ink); stroke-width: 2; stroke-linejoin: round; stroke-linecap: round; }
  .pm-line.deg { stroke: var(--crit); }
  .pm-dot { fill: var(--ink); }
  .pm-dot.deg { fill: var(--crit); stroke: var(--surface); stroke-width: 1.5; }
  /* Qualified with .pm-chart so it outweighs `.pm-chart text` (0,1,1) — an
     unqualified .pm-endlabel (0,1,0) loses the cascade and renders muted. */
  .pm-chart text.pm-endlabel { fill: var(--ink); font-weight: 700; font-size: 11px; }
  .pm-cursor { stroke: var(--ink-3); stroke-width: 1; stroke-dasharray: 3 3; opacity: 0; pointer-events: none; }
  .pm-tip { position: absolute; pointer-events: none; opacity: 0; transform: translate(-50%, -100%);
            background: var(--ink); color: var(--bg); border-radius: 8px; padding: 7px 9px;
            font-size: 11.5px; line-height: 1.5; white-space: nowrap;
            box-shadow: 0 4px 16px rgba(0,0,0,0.22); z-index: 5; transition: opacity .08s; }
  .pm-tip .deg { color: var(--crit); font-weight: 700; }
  .pm-empty { color: var(--ink-3); padding: 26px 4px; }
  .pm-note { color: var(--ink-3); font-size: 12px; margin: 10px 2px 0; line-height: 1.5; }
  .pm-note a { color: var(--ink-3); }
  .pm-note .deg { color: var(--crit); font-weight: 600; }
  .pm-controls { display: flex; justify-content: flex-end; margin: 0 2px 10px; }
  .pm-toggle { display: inline-flex; gap: 2px; background: var(--surface); border: 1px solid var(--border);
               border-radius: 8px; padding: 2px; }
  .pm-toggle button { background: none; border: 0; color: var(--ink-2); font: inherit; font-size: 12.5px;
                      padding: 5px 12px; border-radius: 6px; cursor: pointer; }
  .pm-toggle button.on { background: var(--surface-2); color: var(--ink); font-weight: 600; }
  /* ---- Pipeline FSM conformance ---- */
  .fsm-alarm { display: flex; align-items: center; gap: 14px; border-radius: 12px; padding: 14px 18px; margin: 12px 0; }
  .fsm-alarm.bad { background: var(--debt-bg); border: 1.5px solid var(--crit); cursor: pointer; text-align: left; color: inherit; font: inherit; width: 100%; }
  .fsm-alarm.ok { background: var(--clean-bg); border: 1px solid var(--clean); }
  .fsm-alarm .an { font-size: 32px; font-weight: 750; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; line-height: 1; }
  .fsm-alarm.bad .an { color: var(--crit); }
  .fsm-alarm.ok .an { color: var(--clean); }
  .fsm-alarm .atxt { font-size: 13.5px; color: var(--ink-2); line-height: 1.45; }
  .fsm-alarm .atxt b { color: var(--ink); }
  .fsm-rail { display: flex; flex-wrap: wrap; align-items: stretch; gap: 5px; margin: 6px 0; }
  .fsm-node { display: flex; flex-direction: column; justify-content: center; gap: 1px; background: var(--surface);
              border: 1px solid var(--border); border-radius: 9px; padding: 7px 12px; }
  .fsm-node .nl { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; color: var(--ink-2); white-space: nowrap; }
  .fsm-node .nc { font-variant-numeric: tabular-nums; font-size: 16px; font-weight: 650; color: var(--ink); }
  .fsm-node.flow .nl { color: var(--ink-3); }
  .fsm-node.done { border-color: var(--clean); }
  .fsm-arrow { align-self: center; color: var(--ink-3); font-size: 13px; }
  .fsm-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(155px, 1fr)); gap: 10px; margin: 12px 0; }
  .fsm-state { text-align: left; background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--border);
               border-radius: 11px; padding: 12px 14px; cursor: pointer; color: inherit; font: inherit; width: 100%; }
  .fsm-state:hover { background: var(--surface-2); }
  .fsm-state.sel { background: var(--surface-2); box-shadow: inset 0 0 0 1px var(--border); }
  .fsm-state.flow { border-left-color: var(--clean); }
  .fsm-state.rule { border-left-color: var(--accent); }
  .fsm-state.blk { border-left-color: var(--debt); }
  .fsm-state.zero { opacity: 0.5; }
  .fsm-state .sc { font-size: 23px; font-weight: 650; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
  .fsm-state .sk { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; color: var(--ink-2); margin-top: 1px; }
  .fsm-state .sa { font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--ink-3); margin-top: 3px; }
  .fsm-list { margin: 2px 0 4px; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; display: none; }
  .fsm-list.open { display: block; }
  .fsm-list .li { display: block; padding: 9px 13px; border-bottom: 1px solid var(--border); text-decoration: none; color: var(--ink); font-size: 13.5px; }
  .fsm-list .li:last-child { border-bottom: 0; }
  .fsm-list .li:hover { background: var(--surface); }
  .fsm-list .li .lr { color: var(--ink-2); font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; }
  .fsm-list .li .lz { display: block; color: var(--ink-3); font-size: 12px; margin-top: 2px; }
  .fsm-list .fsm-dh { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; padding: 8px 13px; background: var(--surface); border-bottom: 1px solid var(--border); }
  .fsm-list .fsm-dh .dhl { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; color: var(--ink-2); }
  .fsm-list .fsm-dh .dhc { font-variant-numeric: tabular-nums; font-size: 12px; color: var(--ink-3); white-space: nowrap; }
  .fsm-list .empty { padding: 12px 13px; }
  .fsm-note { color: var(--ink-3); font-size: 12px; margin: 8px 2px 0; line-height: 1.5; }
  .fsm-note a, .fsm-note code { color: var(--ink-3); }
  .fsm-lane { margin: 14px 0 2px; }
  .fsm-lane-h { display: flex; align-items: baseline; gap: 8px; margin: 0 2px 6px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-3); }
  .fsm-lane-h .lct { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-variant-numeric: tabular-nums; color: var(--ink-2); font-weight: 650; text-transform: none; letter-spacing: 0; }
  .fsm-lane .fsm-grid { margin: 0; }
  /* ---- External (Protofire) audit coverage ---- */
  .au-alarm { display: flex; align-items: center; gap: 14px; border-radius: 12px; padding: 14px 18px; margin: 12px 0; }
  .au-alarm.bad { background: var(--debt-bg); border: 1.5px solid var(--crit); }
  .au-alarm.ok { background: var(--clean-bg); border: 1px solid var(--clean); }
  .au-alarm .an { font-size: 32px; font-weight: 750; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; line-height: 1; }
  .au-alarm.bad .an { color: var(--crit); }
  .au-alarm.ok .an { color: var(--clean); }
  .au-alarm .atxt { font-size: 13.5px; color: var(--ink-2); line-height: 1.45; }
  .au-alarm .atxt b { color: var(--ink); }
  .au-table { border: 1px solid var(--border); border-radius: 11px; overflow: hidden; margin: 4px 0 2px; }
  .au-row { display: grid; grid-template-columns: 230px 84px 1fr; gap: 14px; align-items: start;
            padding: 11px 14px; border-bottom: 1px solid var(--border); }
  .au-row:last-child { border-bottom: 0; }
  .au-row.stale { background: var(--debt-bg); }
  .au-repo a { color: var(--ink); font-weight: 600; text-decoration: none; font-size: 14px; word-break: break-word; }
  .au-repo a:hover { color: var(--accent); text-decoration: underline; }
  .au-sub { color: var(--ink-3); font-size: 12px; margin-top: 3px; line-height: 1.5;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace; word-break: break-word; }
  .au-flag { display: inline-block; font-size: 11px; color: var(--debt); border: 1px solid var(--debt-border);
             background: var(--debt-bg); border-radius: 5px; padding: 0 5px; margin-top: 3px; font-family: inherit; }
  .au-status { display: inline-flex; align-items: center; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em;
               font-weight: 650; border-radius: 6px; padding: 3px 7px; white-space: nowrap; }
  .au-status.stale { color: var(--crit); border: 1px solid var(--crit); background: transparent; }
  .au-status.current { color: var(--clean); border: 1px solid var(--clean); background: transparent; }
  .au-status.na { color: var(--ink-3); border: 1px solid var(--border); background: transparent; }
  .au-drift { font-size: 13px; color: var(--ink-2); line-height: 1.55; }
  .au-drift .add { font-weight: 650; color: var(--clean); font-variant-numeric: tabular-nums; }
  .au-drift .del { font-weight: 650; color: var(--crit); font-variant-numeric: tabular-nums; }
  .au-drift .dim { color: var(--ink-3); }
  .au-drift .ok { color: var(--clean); }
  .au-drift a.au-drift-link { color: var(--ink-2); text-decoration: none; cursor: pointer; }
  .au-drift a.au-drift-link:hover { text-decoration: underline; }
  .au-gap { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0 2px; }
  .au-gapchip { font-size: 12.5px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
                color: var(--ink-2); background: var(--surface); border: 1px solid var(--border);
                border-radius: 6px; padding: 2px 8px; text-decoration: none; }
  .au-gapchip:hover { color: var(--accent); border-color: var(--accent); }
  .au-toggle { background: var(--surface); border: 1px solid var(--border); color: var(--ink-2);
               border-radius: 8px; padding: 6px 11px; font-size: 13px; cursor: pointer; margin: 4px 0; }
  .au-note { color: var(--ink-3); font-size: 12px; margin: 10px 2px 0; line-height: 1.5; }
  .au-note code { color: var(--ink-3); }
  .au-subhead { font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--ink-3);
                margin: 20px 0 6px; font-weight: 600; }
  footer { margin-top: 40px; color: var(--ink-3); font-size: 12px; }
  footer a { color: var(--ink-3); }
  @media (max-width: 620px) {
    .srow { grid-template-columns: 130px 1fr 30px; }
    .repo { grid-template-columns: 1fr; gap: 8px; }
  }
  .nav { display: flex; flex-wrap: wrap; gap: 2px; margin: 14px 0 6px; border-bottom: 1px solid var(--border); }
  .nav a { padding: 8px 13px; color: var(--ink-2); text-decoration: none; font-size: 13.5px;
           border-bottom: 2px solid transparent; margin-bottom: -1px; }
  .nav a:hover { color: var(--ink); }
  .nav a.active { color: var(--ink); border-bottom-color: var(--accent); font-weight: 600; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>rain org health</h1>
    <span class="meta" id="meta">loading…</span>
    <button class="theme-btn" id="theme" aria-label="Toggle theme">◐ theme</button>
  </header>
  <nav class="nav">
    <a href="index.html">Overview</a>
    <a href="repositories.html">Repositories</a>
    <a href="audit.html">Audit</a>
    <a href="pipeline.html" class="active">Pipeline</a>
    <a href="metrics.html">Metrics</a>
  </nav>
  <h2>Pipeline state machine</h2>
  <div id="fsm"><div class="empty" id="fsmempty">loading pipeline state…</div></div>
  <footer>
    Org-health dashboard — status, not severity; identity is the label, not the color.
    <a href="https://github.com/rainlanguage/rain-org-health" rel="noopener">source</a>.
  </footer>
</div>
<script type="module">
const $ = (id) => document.getElementById(id);
// Theme toggle: default follows the OS; the button stamps data-theme to override.
$("theme").addEventListener("click", () => {
  const cur = document.documentElement.getAttribute("data-theme");
  const isDark = cur ? cur === "dark" : matchMedia("(prefers-color-scheme: dark)").matches;
  document.documentElement.setAttribute("data-theme", isDark ? "light" : "dark");
});
// ---- Pipeline FSM: the daily conformance review (README "Pipeline state machine").
// Every open producer PR/issue sits in exactly one modeled ai:* state; the leak
// bucket = PRs with a producer note but no state label, and should trend to zero.
// Consumes health.json's `humanQueue` block (schema == `pr-review-report human-queue --json`).
// All human-queue fields are UNTRUSTED (titles/reasons are attacker-influenceable PR/issue
// content). This panel builds the DOM directly (createElement / textContent / .append / .href),
// matching the rest of the dashboard — so escaping is BY CONSTRUCTION and there is no hand-rolled
// HTML escaper to keep correct at every sink.
function renderFsm(hq) {
  const box = $("fsm");
  const el = (tag, cls, text) => {
    const n = document.createElement(tag);
    if (cls) n.className = cls;
    if (text !== undefined) n.textContent = text;
    return n;
  };
  // A link whose href is set via the .href PROPERTY (the DOM escapes it) — never string-built.
  const link = (cls, text, href) => {
    const a = el("a", cls, text);
    a.href = href;
    a.rel = "noopener";
    a.target = "_blank";
    return a;
  };

  box.textContent = "";
  if (!hq || !hq.counts) {
    const empty = el("div", "empty");
    empty.append(
      "Pipeline state not wired yet — populated once ",
      link(null, "the human-queue tool", "https://github.com/rainlanguage/issue-pr-cron/pull/41"),
      " lands and the scan folds it into health.json."
    );
    box.append(empty);
    return;
  }
  const c = hq.counts;
  const urlOf = (it, issue) => `https://github.com/${it.repo}/${issue ? "issues" : "pull"}/${Number(it.number)}`;

  // Main lifecycle rail — issue → un-vetted → ai:ready → queue → approved → merged.
  const rail = el("div", "fsm-rail");
  const railNodes = [
    { l: "open issue" }, { l: "un-vetted" }, { l: "ai:ready", n: c.ready },
    { l: "queue" }, { l: "approved" }, { l: "merged", done: true },
  ];
  railNodes.forEach((nd, i) => {
    const node = el("div", "fsm-node" + (nd.done ? " done" : nd.n == null ? " flow" : ""));
    node.append(el("span", "nl", nd.l));
    if (nd.n != null) node.append(el("span", "nc", String(Number(nd.n))));
    rail.append(node);
    if (i < railNodes.length - 1) rail.append(el("span", "fsm-arrow", "→"));
  });

  // Leak bucket — the loudest element.
  let alarm;
  if (c.leaks > 0) {
    alarm = el("button", "fsm-alarm bad");
    alarm.dataset.t = "leak";
    const atxt = el("span", "atxt");
    atxt.append(
      el("b", null, "not in any modeled state"),
      " — producer PRs with a note but no ",
      el("code", null, "ai:*"),
      " label. The FSM-leak signal; it should be ",
      el("b", null, "zero"),
      ". Click to see what needs modeling."
    );
    alarm.append(el("span", "an", String(Number(c.leaks))), atxt);
  } else {
    alarm = el("div", "fsm-alarm ok");
    const atxt = el("span", "atxt");
    atxt.append(el("b", null, "fully conformant"), " — every open PR sits in a modeled state.");
    alarm.append(el("span", "an", "0"), atxt);
  }

  // The full machine, grouped by lane (issue-pr-cron `human-queue --json` `lanes`
  // object: lane -> state -> { count, prs:[{repo,number,url,title}] }). The object is
  // SPARSE (only non-empty states are emitted), so the lane/state set below is the
  // canonical shape — a state absent from the JSON renders zero (dimmed), keeping the
  // machine's whole shape visible. laneItems maps a state key -> its PR list for the
  // click-to-expand detail. closeCandidateIssues (open ai:close-candidate ISSUES, not
  // PRs) is carried alongside as its own group so that inventory isn't lost.
  const hasLanes = hq.lanes && typeof hq.lanes === "object";
  const laneItems = new Map();
  const laneState = (lane, state) => (hq.lanes[lane] && hq.lanes[lane][state]) || null;

  const stateBox = (key, label, count, act, kind) => {
    const b = el("button", "fsm-state " + kind + (count ? "" : " zero"));
    b.dataset.t = key;
    b.append(el("div", "sc", String(Number(count))), el("div", "sk", label), el("div", "sa", act));
    return b;
  };

  // Renders every state (kind: flow = moving, rule = needs a human ruling, blk = a
  // stuck/rework pile) in lane order vet-lifecycle → vetter-verdicts → producer-blocked
  // → human-decisions, then the close-candidate ISSUES as a final group.
  const LANES = [
    { title: "vet lifecycle", lane: "vet-lifecycle", states: [
      { state: "un-vetted", act: "awaiting first vet", kind: "flow" },
      { state: "awaiting-re-vet", act: "head moved · re-vet", kind: "flow" },
    ] },
    { title: "vetter verdicts", lane: "vetter-verdicts", states: [
      { state: "ai:ready", act: "merge", kind: "flow" },
      { state: "ai:reject", act: "producer reworks", kind: "blk" },
      { state: "ai:relink", act: "Closes → Refs", kind: "rule" },
      { state: "ai:design", act: "rule", kind: "rule" },
      { state: "ai:close-candidate", act: "close PR", kind: "rule" },
    ] },
    { title: "producer blocked", lane: "producer-blocked", states: [
      { state: "ai:blocked-deploy", act: "diagnose deploy", kind: "blk" },
      { state: "ai:blocked-infra", act: "fix infra", kind: "blk" },
      { state: "ai:blocked-on", act: "unblock dep", kind: "blk" },
    ] },
    { title: "human decisions", lane: "human-decisions", states: [
      { state: "human:reject", act: "override", kind: "rule" },
      { state: "human:design", act: "override", kind: "rule" },
      { state: "human:close-candidate", act: "override", kind: "rule" },
    ] },
  ];

  const grid = el("div"); // container appended into the panel below
  if (hasLanes) {
    LANES.forEach((L) => {
      const g = el("div", "fsm-grid");
      let laneTotal = 0;
      L.states.forEach((s) => {
        const cell = laneState(L.lane, s.state);
        const count = cell ? Number(cell.count) || 0 : 0;
        laneTotal += count;
        laneItems.set(s.state, (cell && cell.prs) || []);
        // The PR close-candidate state and the close-candidate ISSUES group both read
        // `ai:close-candidate`; qualify the PR one so the two never look identical.
        const boxLabel = s.state === "ai:close-candidate" ? "ai:close-candidate (PRs)" : s.state;
        g.append(stateBox(s.state, boxLabel, count, s.act, s.kind));
      });
      const lane = el("div", "fsm-lane");
      const h = el("div", "fsm-lane-h");
      h.append(el("span", null, L.title), el("span", "lct", String(laneTotal)));
      lane.append(h, g);
      grid.append(lane);
    });
    // Close-candidate ISSUES (open ai:close-candidate issues, distinct from the PR state).
    const ig = el("div", "fsm-grid");
    ig.append(stateBox("closeCandidateIssues", "ai:close-candidate (issues)", Number(c.closeCandidateIssues) || 0, "close issue", "rule"));
    const ilane = el("div", "fsm-lane");
    const ih = el("div", "fsm-lane-h");
    ih.append(el("span", null, "close-candidate issues"), el("span", "lct", String(Number(c.closeCandidateIssues) || 0)));
    ilane.append(ih, ig);
    grid.append(ilane);
  } else {
    // Backward-compat: an older human-queue.json with no `lanes` — render the original
    // 6 human-action states from the legacy `states`/`counts` keys so the panel never blanks.
    const legacy = [
      { key: "ai:ready", label: "ai:ready", n: c.ready, act: "merge", kind: "flow" },
      { key: "ai:design", label: "ai:design", n: c.design, act: "rule", kind: "rule" },
      { key: "closeCandidateIssues", label: "ai:close-candidate", n: c.closeCandidateIssues, act: "close", kind: "rule" },
      { key: "ai:blocked-deploy", label: "ai:blocked-deploy", n: c.blockedDeploy, act: "diagnose deploy", kind: "blk" },
      { key: "ai:blocked-infra", label: "ai:blocked-infra", n: c.blockedInfra, act: "fix infra", kind: "blk" },
      { key: "ai:blocked-on", label: "ai:blocked-on", n: c.blockedOn, act: "unblock dep", kind: "blk" },
    ];
    const g = el("div", "fsm-grid");
    legacy.forEach((s) => g.append(stateBox(s.key, s.label, s.n, s.act, s.kind)));
    grid.append(g);
  }

  // itemsFor returns { arr, issue } for a state key: the item list, and whether the
  // items are issues (vs PRs) — which decides the GitHub URL path.
  const itemsFor = (key) => {
    if (key === "leak") return { arr: hq.leaks || [], issue: false };
    if (key === "closeCandidateIssues") return { arr: hq.closeCandidateIssues || [], issue: true };
    if (laneItems.has(key)) return { arr: laneItems.get(key), issue: false };
    return { arr: (hq.states && hq.states[key]) || [], issue: false };
  };

  // Detail body for a clicked box: a header naming THIS state and its OWN item count
  // (the list length rendered directly below it), so the panel can never read as
  // belonging to another section, then the items.
  const detailBody = (key, label) => {
    const { arr, issue } = itemsFor(key);
    const frag = document.createDocumentFragment();
    const h = el("div", "fsm-dh");
    h.append(el("span", "dhl", label), el("span", "dhc", arr.length + (arr.length === 1 ? " item" : " items")));
    frag.append(h);
    if (!arr.length) {
      frag.append(el("div", "empty", "no items in this state"));
      return frag;
    }
    arr.forEach((it) => {
      const a = link("li", undefined, urlOf(it, issue));
      a.append(el("span", "lr", it.repo + "#" + Number(it.number)), " " + (it.title == null ? "" : it.title));
      if (it.reason) a.append(el("span", "lz", it.reason));
      frag.append(a);
    });
    return frag;
  };

  const note = el("div", "fsm-note");
  note.append(
    "The pipeline is a ",
    link(null, "finite state machine", "https://github.com/rainlanguage/issue-pr-cron/blob/main/README.md"),
    " — every open PR/issue sits in exactly one modeled ",
    el("code", null, "ai:*"),
    " state, and this is the daily conformance review"
  );
  if (hq.sample) note.append(" ", el("b", null, "(sample data — live once issue-pr-cron#41 lands)"));
  note.append(".");

  const detail = el("div", "fsm-list");
  detail.id = "fsmdetail";
  box.append(alarm, rail, grid, detail, note);

  // Header label for a clicked box: its own state label (.sk), or a friendly name for
  // the leak alarm (which carries no .sk).
  const labelOf = (b, k) => {
    const sk = b.querySelector && b.querySelector(".sk");
    if (sk && sk.textContent) return sk.textContent;
    return k === "leak" ? "not in any modeled state" : k;
  };

  let openKey = null;
  box.querySelectorAll("[data-t]").forEach((b) => b.addEventListener("click", () => {
    const k = b.dataset.t;
    box.querySelectorAll("[data-t]").forEach((x) => x.classList.remove("sel"));
    if (openKey === k) { detail.classList.remove("open"); openKey = null; return; }
    openKey = k;
    detail.replaceChildren(detailBody(k, labelOf(b, k)));
    // Attach the detail directly beneath the lane (or the box) that owns the clicked
    // state, so the list reads as belonging to THAT state — not parked under the last
    // lane on the page (previously the fixed panel always sat under close-candidate
    // issues, so every state's list looked attached to it).
    const anchor = (b.closest && b.closest(".fsm-lane")) || b;
    anchor.after(detail);
    detail.classList.add("open");
    if (b.classList.contains("fsm-state")) b.classList.add("sel");
  }));
}

// FSM-conformance state is issue-pr-cron's OWN artifact, fetched at runtime like the producer
// metrics below — never baked into this repo or computed here (CLAUDE.md: the dashboard is a
// consumer, not a producer, of data; new data ⇒ new fetch, not new baking).
const HQ_URL = "https://raw.githubusercontent.com/rainlanguage/issue-pr-cron/main/human-queue.json";
$("meta").textContent = "pipeline conformance · issue-pr-cron";
fetch(HQ_URL, { cache: "no-store" })
  .then((r) => (r.ok ? r.json() : null))
  .then(renderFsm)
  .catch(() => renderFsm(null));
</script>
</body>
</html>
